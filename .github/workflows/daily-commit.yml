name: Daily Skill Sync & Commit

on:
  schedule:
    # Run at 02:00 UTC daily
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  sync-and-commit:
    runs-on: macos-latest
    permissions:
      contents: write
      
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          
      - name: Configure Git
        run: |
          git config --global user.email "agent@openclaw.local"
          git config --global user.name "OpenClaw Agent"
          
      - name: Check for skill changes
        id: check
        run: |
          # Check if there are uncommitted changes in skills/
          if git diff --quiet skills/; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
          fi
          
      - name: Commit skill updates
        if: steps.check.outputs.has_changes == 'true'
        run: |
          git add skills/
          git commit -m "Daily skill sync: $(date -u +'%Y-%m-%d %H:%M:%S UTC')"
          git push origin main
          
      - name: Log sync status
        run: |
          echo "Skill sync completed at $(date -u +'%Y-%m-%d %H:%M:%S UTC')"
          echo "Repository status:"
          git log --oneline -5
